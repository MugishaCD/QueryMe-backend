# Database Configuration
spring:
  application:
    name: QueryMe-backend
  datasource:
    url: jdbc:postgresql://localhost:5432/queryme_app
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

# JWT Configuration
queryme:
  app:
    jwtSecret: QueryMeApplicationSecretKeyMustBeLongEnoughForHMACSHA256SignatureAlgorithm
    jwtExpirationMs: 86400000